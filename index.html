<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Lungmen Stacky Stack</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        font-family: system-ui, sans-serif;
      }

      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
        outline: none;
      }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #fff;
        font-size: 20px;
        font-weight: 600;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud">Score: <span id="score">0</span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
